name: Sync Files to Client Repos

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run file sync
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ secrets.GH_PAT }}
          CONFIG_PATH: .sync.yml
          COMMIT_PREFIX: "chore: sync files from wearepixel/pixel-workflows -"
          PR_LABELS: "sync"
