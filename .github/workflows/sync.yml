name: Sync Files to Client Repos

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 1 * * *'  # daily at 1am UTC
  workflow_dispatch:

jobs:
  sync-wearepixel:
    name: Sync to wearepixel repos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: wearepixel

      - name: Run file sync
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_INSTALLATION_TOKEN: ${{ steps.app-token.outputs.token }}
          CONFIG_PATH: .sync-wearepixel.yml
          COMMIT_PREFIX: "chore: sync files from wearepixel/pixel-workflows -"
          SKIP_PR: true

  sync-nourishd:
    name: Sync to nourishd repos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: nourishd

      - name: Run file sync
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_INSTALLATION_TOKEN: ${{ steps.app-token.outputs.token }}
          CONFIG_PATH: .sync-nourishd.yml
          COMMIT_PREFIX: "chore: sync files from wearepixel/pixel-workflows -"
          SKIP_PR: true
